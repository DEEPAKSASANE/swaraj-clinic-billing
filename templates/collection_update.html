<!DOCTYPE html>
<html>
<head>
    <title>Update Collection</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:650px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#2563eb;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:12px;
            margin-bottom:5px;
            font-weight:bold;
            color:#333;
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        textarea{
            resize:none;
            height:90px;
        }

        .update-btn{
            width:100%;
            margin-top:20px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#16a34a;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        .update-btn:hover{
            background:#15803d;
        }

        .back-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            padding:12px;
            text-decoration:none;
            background:#2563eb;
            color:white;
            border-radius:8px;
            font-weight:bold;
        }

        .back-btn:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Update Collection</h1>

    <form method="POST" action="/collection-update/{{.ID}}">

        <label>Date</label>
        <input type="date" name="collection_date" value="{{.Date}}" required>

        <label>Cash Amount</label>
        <input type="number" step="0.01" name="cash_amount" value="{{.Cash}}" required>

        <label>Online Amount</label>
        <input type="number" step="0.01" name="online_amount" value="{{.Online}}" required>

        <label>Expense Amount</label>
        <input type="number" step="0.01" name="expense_amount" value="{{.Expense}}" required>

        <label>Expense Reason</label>
        <input type="text" name="expense_reason" value="{{.Reason}}">

        <label>Remark</label>
        <textarea name="remark">{{.Remark}}</textarea>

        <label>Entered By</label>
        <input type="text" name="entered_by" value="{{.EnteredBy}}">

        <button type="submit" class="update-btn">
            Update Collection
        </button>

    </form>

    <a href="/collection-report" class="back-btn">
        Back To Report
    </a>

</div>

</body>
</html>
