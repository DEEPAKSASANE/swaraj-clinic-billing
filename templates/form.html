
<!DOCTYPE html>
<html lang="en">
{{template "nav.html" .}}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Invoice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e7e3e6;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      background: hsl(180, 17%, 90%);
      padding: 30px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .form-control {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .half {
      width: calc(50% - 10px);
    }

    .full {
      width: 100%;
    }

    textarea.form-control {
      resize: vertical;
      width: 100%;
      min-height: 7px;
      font-size: 1rem;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th,
    td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      padding: 10px 16px;
      margin: 5px 2px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    button[type="submit"] {
      background-color: #667eea;
      color: #fff;
    }

    button:hover {
      opacity: 0.9;
    }

    button[onclick^="addRow"] {
      background-color: #48bb78;
      color: #fff;
    }

    button[onclick^="deleteRow"] {
      background-color: #e53e3e;
      color: white;
    }

    button[onclick^="updateRow"] {
      background-color: #3182ce;
      color: rgb(240, 231, 231);
    }

    .total {
      margin-top: 20px;
      font-weight: bold;
      text-align: right;
      font-size: 1.2rem;
      color: #333;
    }

    .total p {
      margin: 5px 0;
    }

    .custom-test-section {
      margin-top: 30px;
      padding: 20px;
      background-color: #f2f7f6;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    .custom-test-section h3 {
      margin-bottom: 15px;
      color: #2d3748;
      font-size: 1.2rem;
    }

    .custom-test-section input {
      margin-bottom: 10px;
    }

    .custom-test-section button {
      background-color: #48bb78;
      color: white;
    }

    input[name="price[]"],
    input[name="discount[]"],
    input[name="total[]"] {
      width: 100px;
      text-align: right;
    }

    @media (max-width: 600px) {
      .row {
        flex-direction: column;
      }

      .half {
        width: 100%;
      }
    }
  </style>
</head>

  <!-- JavaScript Functions -->
  <script>
    function updatePrice(select) {
      const row = select.closest("tr");
      const priceField = row.querySelector('[name="price[]"]');
      const discountField = row.querySelector('[name="discount[]"]');
      const totalField = row.querySelector('[name="total[]"]');
      const [testName, price] = select.value.split('|');
      priceField.value = price || 0;
      discountField.value = 0;
      totalField.value = price || 0;
      updateGrandTotal();
    }

    function calculateTotal(discountInput) {
      const row = discountInput.closest("tr");
      const price = parseFloat(row.querySelector('[name="price[]"]').value || 0);
      let discount = parseFloat(discountInput.value || 0);
      discount = Math.min(Math.max(discount, 0), 100);
      const total = price - (price * discount / 100);
      row.querySelector('[name="total[]"]').value = total.toFixed(2);
      updateGrandTotal();
    }

    function addRow() {
      const tableBody = document.querySelector("#itemTable tbody");
      const newRow = tableBody.rows[0].cloneNode(true);
      newRow.querySelectorAll("input").forEach(input => input.value = "");
      newRow.querySelector("select").selectedIndex = 0;
      tableBody.appendChild(newRow);
    }

    function updateRow(button) {
      const row = button.closest("tr");
      const price = parseFloat(row.querySelector('[name="price[]"]').value || 0);
      const discount = parseFloat(row.querySelector('[name="discount[]"]').value || 0);
      const total = price - (price * discount / 100);
      row.querySelector('[name="total[]"]').value = total.toFixed(2);
      updateGrandTotal();
    }

    function deleteRow(button) {
      const row = button.closest("tr");
      const tableBody = document.querySelector("#itemTable tbody");
      if (tableBody.rows.length > 1) {
        row.remove();
        updateGrandTotal();
      } else {
        alert("At least one test must remain.");
      }
    }

    function updateGrandTotal() {
      let grandTotal = 0;
      document.querySelectorAll('[name="total[]"]').forEach(input => {
        grandTotal += parseFloat(input.value || 0);
      });
      document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
      document.getElementById("amountInWords").innerText = convertToWords(Math.floor(grandTotal)) + " Rupees";
    }

    function convertToWords(num) {
      const a = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten",
        "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen",
        "Eighteen", "Nineteen"];
      const b = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];

      if (num === 0) return "Zero";
      if (num > 9999) return "Amount too large";

      let words = "";
      if (Math.floor(num / 1000) > 0) {
        words += a[Math.floor(num / 1000)] + " Thousand ";
        num %= 1000;
      }
      if (Math.floor(num / 100) > 0) {
        words += a[Math.floor(num / 100)] + " Hundred ";
        num %= 100;
      }
      if (num > 0) {
        if (num < 20) {
          words += a[num];
        } else {
          words += b[Math.floor(num / 10)] + " " + a[num % 10];
        }
      }
      return words.trim();
    }

    function addCustomTest() {
      const testName = document.getElementById("customTestName").value.trim();
      const testPrice = parseFloat(document.getElementById("customTestPrice").value.trim());

      if (!testName || isNaN(testPrice)) {
        alert("Please enter a valid test name and price.");
        return;
      }

      const tableBody = document.querySelector("#itemTable tbody");
      const newRow = tableBody.rows[0].cloneNode(true);

      const selectBox = newRow.querySelector("select");
      const newOption = document.createElement("option");
      newOption.text = `${testName}`;
      newOption.value = `${testName}|${testPrice}`;
      selectBox.appendChild(newOption);
      selectBox.value = newOption.value;

      newRow.querySelector('[name="price[]"]').value = testPrice;
      newRow.querySelector('[name="discount[]"]').value = 0;
      newRow.querySelector('[name="total[]"]').value = testPrice.toFixed(2);

      tableBody.appendChild(newRow);

      document.getElementById("customTestName").value = "";
      document.getElementById("customTestPrice").value = "";

      updateGrandTotal();
    }
  </script>
