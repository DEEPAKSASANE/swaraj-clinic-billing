<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Invoice</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Arial, sans-serif;
        }

        body{
            background:#eef3ff;
            min-height:100vh;
        }

        /* Search Section */
        .search-wrapper{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:calc(100vh - 100px);
            padding:30px;
        }

        .container{
            width:420px;
            background:#fff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
            text-align:center;
        }

        .container h2{
            color:#2563eb;
            margin-bottom:25px;
            font-size:36px;
        }

        .container p{
            color:#666;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:14px;
            border:2px solid #d1d5db;
            border-radius:8px;
            font-size:16px;
            margin-bottom:15px;
            outline:none;
        }

        input:focus{
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        @media(max-width:768px){
            .container{
                width:95%;
            }

            .container h2{
                font-size:28px;
            }
        }
    </style>
</head>

<body>

    {{template "nav.html" .}}

    <div class="search-wrapper">

        <div class="container">

            <h2>🔍 Search Invoice By ID</h2>

            <p>Enter Invoice ID to view invoice details.</p>

            <form action="/invoice-search" method="GET">

                <input
                    type="number"
                    name="id"
                    placeholder="Enter Invoice ID"
                    required>

                <button type="submit">
                    Search Invoice
                </button>

            </form>

        </div>

    </div>

</body>
</html>
